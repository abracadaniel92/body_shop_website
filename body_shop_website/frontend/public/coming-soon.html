<!doctype html>
<html lang="mk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Дака Драган - Наскоро</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(180deg, #090d17 0%, #0e1118 100%);
        color: #f5f5f7;
        font-family: 'Segoe UI', Arial, sans-serif;
        text-align: center;
        padding: 24px;
      }
      .card {
        width: min(680px, 100%);
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.03);
        padding: 30px 22px;
      }
      .logo {
        max-width: 220px;
        width: 100%;
        height: auto;
        margin-bottom: 16px;
      }
      h1 {
        margin: 0 0 10px;
        font-size: clamp(1.8rem, 4vw, 2.5rem);
        letter-spacing: 0.03em;
        text-transform: uppercase;
      }
      p {
        margin: 0;
        opacity: 0.9;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <img class="logo" src="/logo.png" alt="Дака Драган" />
      <h1>Наскоро</h1>
      <p>Работиме на новата веб страница. Закажување и информации наскоро.</p>
    </main>
  </body>
</html>
